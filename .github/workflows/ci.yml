name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Create virtual environment
      run: python3 -m venv .venv
    - name: Install dependencies
      run: |
        . .venv/bin/activate
        pip install pytest pyyaml
    - name: Run tests
      run: |
        . .venv/bin/activate
        
    - name: Debug Environment
      run: |
        echo "HOME: $HOME"
        echo "PATH: $PATH"
        echo "Listing ~/.config/huntools:"
        ls -la $HOME/.config/huntools || true
        echo "Listing ~/.huntools:"
        ls -la $HOME/.huntools || true
        echo "Running huntools.py display --all:"
        python3 huntools.py display --all || true
        
    - name: Run tests
      run: |
        . .venv/bin/activate
        pytest tests/